name: Deploy API to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: cloudrun-deploy
  cancel-in-progress: false

env:
  DOCKER_REGISTRY: docker.io
  IMAGE_NAME: chiwi

jobs:
  build:
    name: Build and push image
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_sha: ${{ steps.tag.outputs.image_sha }}
      image_latest: ${{ steps.tag.outputs.image_latest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tag
        id: tag
        run: |
          IMAGE_BASE="${DOCKER_REGISTRY}/${{ vars.DOCKERHUB_USERNAME }}/${IMAGE_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_sha=${IMAGE_BASE}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_BASE}:latest" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ steps.tag.outputs.image_sha }}
            ${{ steps.tag.outputs.image_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: build
    environment: prod
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --image="${{ needs.build.outputs.image_sha }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --platform=managed \
            --quiet

          SERVICE_URL=$(gcloud run services describe "${{ secrets.CLOUD_RUN_SERVICE }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --format='value(status.url)')
          echo "Deployed to: ${SERVICE_URL}"
