name: Deploy to VM

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "config/**"
      - "cron/**"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

concurrency:
  group: vm-deploy
  cancel-in-progress: false

env:
  IMAGE_BASE: docker.io/${{ vars.DOCKERHUB_USERNAME }}/chiwi

jobs:
  build-push:
    name: Build and push image
    runs-on: ubuntu-latest
    environment: prod
    outputs:
      image_sha: ${{ steps.tag.outputs.image_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set image tags
        id: tag
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          echo "image_sha=${{ env.IMAGE_BASE }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.tag.outputs.image_sha }}
            ${{ env.IMAGE_BASE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-push
    environment: prod

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/${{ secrets.VM_USER }}/chiwi

            echo "==> Pinning image to ${{ needs.build-push.outputs.image_sha }} ..."
            # Use | as sed delimiter so the / in the image path is not treated as separator
            sed -i "s|image: docker.io/nqh44/chiwi:.*|image: ${{ needs.build-push.outputs.image_sha }}|" docker-compose.yaml

            echo "==> Starting services..."
            docker compose up -d

            echo "==> Pruning old images..."
            docker image prune -f

      - name: Verify containers on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /home/${{ secrets.VM_USER }}/chiwi

            SERVICES="chiwi-api chiwi-worker-behavioral chiwi-worker-budget chiwi-worker-reports"
            MAX_WAIT=60
            ELAPSED=0

            echo "==> Waiting up to ${MAX_WAIT}s for all containers to be running..."
            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              ALL_OK=true
              for svc in $SERVICES; do
                STATUS=$(docker inspect --format='{{.State.Status}}' "$svc" 2>/dev/null || echo "missing")
                if [ "$STATUS" != "running" ]; then
                  echo "  $svc: $STATUS (not ready yet)"
                  ALL_OK=false
                fi
              done
              if $ALL_OK; then
                echo "All containers running."
                break
              fi
              sleep 5
              ELAPSED=$((ELAPSED + 5))
            done

            if ! $ALL_OK; then
              echo "ERROR: containers not healthy after ${MAX_WAIT}s"
              docker compose ps
              docker compose logs --tail=50
              exit 1
            fi

            docker compose ps

      - name: Smoke test — health endpoint from internet
        run: |
          echo "==> Probing https://${{ secrets.VM_DOMAIN }}/health ..."
          for i in 1 2 3 4 5; do
            HTTP_STATUS=$(curl -o /dev/null -sw "%{http_code}" \
              --max-time 10 --retry 0 \
              "https://${{ secrets.VM_DOMAIN }}/health" || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              BODY=$(curl -sf --max-time 10 "https://${{ secrets.VM_DOMAIN }}/health")
              echo "Response: $BODY"
              STATUS_FIELD=$(echo "$BODY" | jq -r '.status' 2>/dev/null || echo "")
              if [ "$STATUS_FIELD" = "ok" ]; then
                echo "Smoke test passed (attempt $i)."
                exit 0
              fi
            fi
            echo "Attempt $i: HTTP $HTTP_STATUS — retrying in 10s..."
            sleep 10
          done
          echo "ERROR: /health did not return {\"status\":\"ok\"} after 5 attempts."
          exit 1
