# Production docker-compose — uses pre-built registry images.
# For local development, docker-compose.override.yml is auto-applied by
# Docker Compose and adds build: targets + nginx + public port binding.

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-app: &app-config
  image: docker.io/nqh44/chiwi:latest
  restart: unless-stopped
  logging: *default-logging
  env_file:
    - .env
  depends_on:
    redis:
      condition: service_started
    mongo:
      condition: service_started

services:
  mongo:
    image: mongo:8
    container_name: chiwi-mongo
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongo:/data/db
    restart: unless-stopped
    logging: *default-logging

  redis:
    image: redis:8-alpine
    container_name: chiwi-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    logging: *default-logging
