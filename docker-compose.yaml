# Production docker-compose — uses pre-built registry images.
# For local development, docker-compose.override.yml is auto-applied by
# Docker Compose and adds build: targets + nginx + public port binding.

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-app: &app-config
  image: docker.io/nqh44/chiwi:latest
  logging: *default-logging
  env_file:
    - .env
  volumes:
    - ./user_profiles.json:/data/user_profiles.json

services:
  api:
    <<: *app-config
    container_name: chiwi-api
    ports:
      - "${API_PORT:-8000}:8000"

  # Runs behavioral nudges every hour (cron: 0 * * * *).
  # Anti-spam in BehavioralAgent prevents duplicate nudges within 24 h.
  worker-behavioral:
    <<: *app-config
    container_name: chiwi-worker-behavioral
    command: /usr/local/bin/supercronic /app/cron/worker-behavioral.cron

  # Clears expired budget temp-overrides every hour (cron: 0 * * * *).
  worker-budget:
    <<: *app-config
    container_name: chiwi-worker-budget
    command: /usr/local/bin/supercronic /app/cron/worker-budget.cron

  # Sends the weekly summary report every Monday at 09:00 ICT (cron: 0 9 * * 1).
  worker-reports:
    <<: *app-config
    container_name: chiwi-worker-reports
    command: /usr/local/bin/supercronic /app/cron/worker-reports.cron
